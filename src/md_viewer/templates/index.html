<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Markdown Viewer</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-theme="auto">
<header class="topbar">
  <button id="toggle-sidebar" title="切换文件列表 (Ctrl+B)" aria-label="toggle sidebar">&#9776;</button>
  <svg class="brand-icon" viewBox="0 0 64 64"><rect class="icon-bg" width="64" height="64" rx="8"/><path d="M14 18 L14 46 M24 18 L24 46 M14 32 L20 32 M24 18 L34 18 L34 46"/><line x1="40" y1="22" x2="50" y2="42"/></svg>
  <span class="brand">Markdown Viewer</span>
  <span class="meta" id="file-meta"></span>
  <span class="spacer"></span>
  <button id="toggle-raw" title="切换 Raw/Rendered (R)" disabled>Raw</button>
  <button id="toggle-theme" title="切换主题 (Ctrl+Shift+L)" aria-label="toggle theme">&#9728;</button>
</header>
<main class="layout">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-tools">
      <input id="search" type="search" placeholder="搜索文件名… (Ctrl+K)" autocomplete="off">
      <button id="refresh-tree" class="icon-btn" type="button"
              title="刷新文件树 (Ctrl+Shift+R / F5)" aria-label="refresh tree">
        <svg class="refresh-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4v6h6" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 20v-6h-6" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 10a8 8 0 0 1 14-3.5L20 8" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 14a8 8 0 0 1-14 3.5L4 16" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="tree" class="tree"></div>
  </aside>
  <article id="content" class="content">
    <div id="empty-state" class="empty">&#8592; 在左侧选一个文件</div>
  </article>
  <nav id="toc" class="toc" hidden>
    <div class="toc-title">本页目录</div>
    <ol id="toc-list"></ol>
  </nav>
</main>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
