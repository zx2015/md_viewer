services:
  md-viewer:
    build: .
    image: md-viewer:latest
    container_name: md-viewer
    restart: unless-stopped
    network_mode: host
    volumes:
      # Mount host directories read-only under the unified /data root
      - /root/AI学习:/data/AI学习:ro
      - /media/data/git:/data/git:ro
    environment:
      - MDV_ROOT=/data
      - MDV_HOST=0.0.0.0
      - MDV_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
